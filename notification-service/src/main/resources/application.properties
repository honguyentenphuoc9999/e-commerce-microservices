server.port=8085
spring.application.name=notification-service

# Eureka configuration
eureka.client.service-url.defaultZone=http://localhost:8761/eureka

# Email configuration (Gmail SMTP - Gửi email thật cho khách hàng)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=YOUR_GMAIL@gmail.com
spring.mail.password=YOUR_APP_PASSWORD
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Database configuration
spring.datasource.url=jdbc:mysql://localhost:3306/ecommerce_notifications?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver

# JPA/Hibernate
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update

# App configuration
app.frontend.url=${APP_FRONTEND_URL:https://wonderful-paperbacks-competing-extending.trycloudflare.com}
