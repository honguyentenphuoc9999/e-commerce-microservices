<nav class="fixed top-0 w-full z-50 bg-slate-950/60 backdrop-blur-xl flex justify-between items-center px-8 py-4 w-full shadow-2xl shadow-slate-950/50">

</div>

<main class="flex-grow flex items-center justify-center relative px-6 py-24 overflow-hidden">

<div class="absolute bottom-1/4 -right-20 w-96 h-96 bg-primary/5 rounded-full blur-[120px] pointer-events-none"></div>

<div class="w-full max-w-lg glass-card p-10 md:p-14 rounded-xl shadow-[40px_0_60px_rgba(218,226,253,0.06)] relative z-10">
<div class="flex flex-col gap-8">
<!-- Header -->
<div class="flex flex-col gap-4">
<h1 class="font-headline text-4xl font-extrabold tracking-tight text-on-surface">Khôi phục tài khoản</h1>
<p class="text-on-surface-variant font-body leading-relaxed">
                        Nhập địa chỉ email được liên kết với tài khoản của bạn và chúng tôi sẽ gửi cho bạn một liên kết để đặt lại mật khẩu.
                    </p>
</div>
<!-- Form -->
<form class="flex flex-col gap-6" onsubmit="return false;">
<div class="flex flex-col gap-3">
<label class="font-label text-xs uppercase tracking-widest text-on-surface-variant font-semibold">ĐỊA CHỈ EMAIL</label>
<input class="w-full bg-surface-container-lowest border-none rounded-xl px-6 py-4 text-on-surface placeholder:text-outline/50 focus:ring-1 focus:ring-secondary/40 focus:bg-surface-container-low transition-all" placeholder="email@cua-ban.com" type="email"/>
</div>
<button class="premium-gradient text-on-primary font-headline font-bold py-5 rounded-xl transition-transform active:scale-[0.98] shadow-lg shadow-primary-container/20 group overflow-hidden relative">
<span class="relative z-10">Gửi liên kết đặt lại</span>
<div class="absolute inset-0 bg-white/10 opacity-0 group-hover:opacity-100 transition-opacity"></div>
</button>
</form>
<!-- Footer Link -->
<div class="flex justify-center pt-4">
<a class="group flex items-center gap-2 text-on-surface-variant hover:text-secondary transition-colors duration-300 font-label text-sm uppercase tracking-widest" href="#">
<span class="material-symbols-outlined text-sm">arrow_back</span>
                        Quay lại Đăng nhập
                        <span class="block h-px w-0 bg-secondary transition-all duration-300 group-hover:w-full absolute -bottom-1"></span>
</a>
</div>
</div>
</div>
