<style>
      body {
        background-color: #0b1326;
        color: #dae2fd;
        font-family: 'Inter', sans-serif;
      }
      .glass-card {
        background: rgba(34, 42, 61, 0.4);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
      }

        background: linear-gradient(135deg, #bec6e0 0%, #0f172a 100%);
      }

<body class="min-h-screen flex flex-col justify-between overflow-x-hidden">
<!-- Top Navigation -->
<header class="fixed top-0 w-full z-50 flex justify-center items-center h-20 px-8 bg-transparent backdrop-blur-xl">
<div class="text-2xl font-bold tracking-tighter text-slate-100 font-['Manrope']">
            Digital Atelier
        </div>
</header>
<main class="flex-grow flex items-center justify-center relative px-6 py-24">
<!-- Background Elements -->
<div class="absolute inset-0 z-0 overflow-hidden pointer-events-none">
<div class="absolute -top-[20%] -right-[10%] w-[600px] h-[600px] bg-secondary/5 rounded-full blur-[120px]"></div>
<div class="absolute -bottom-[20%] -left-[10%] w-[500px] h-[500px] bg-tertiary/5 rounded-full blur-[100px]"></div>
</div>
<!-- Login Canvas -->
<div class="w-full max-w-[480px] z-10">
<div class="glass-card rounded-xl p-8 md:p-12 shadow-2xl border border-white/5">
<div class="mb-10 text-center">
<h1 class="text-3xl font-headline font-extrabold tracking-tighter text-on-surface mb-2">Chào mừng trở lại</h1>
<p class="text-on-surface-variant font-body text-sm">Truy cập an toàn vào studio chuyên nghiệp của bạn.</p>
</div>
<form class="space-y-6">
<!-- Input Email -->
<div class="space-y-2">
<label class="block text-xs uppercase tracking-widest font-label font-semibold text-on-surface-variant px-1">Địa chỉ Email</label>
<input class="w-full h-14 bg-surface-container-lowest text-on-surface px-4 rounded-xl border-none focus:ring-1 focus:ring-secondary/40 transition-all placeholder:text-on-surface-variant/30 font-body" placeholder="ten@atelier.com" type="email"/>
</div>
<!-- Input Password -->
<div class="space-y-2">
<div class="flex justify-between items-center px-1">
<label class="text-xs uppercase tracking-widest font-label font-semibold text-on-surface-variant">Mật khẩu</label>
<a class="text-[10px] font-label uppercase tracking-wider text-secondary hover:text-secondary-fixed transition-colors" href="#">Quên mật khẩu?</a>
</div>
<input class="w-full h-14 bg-surface-container-lowest text-on-surface px-4 rounded-xl border-none focus:ring-1 focus:ring-secondary/40 transition-all placeholder:text-on-surface-variant/30 font-body" placeholder="••••••••" type="password"/>
</div>
<!-- Primary CTA -->
<button class="w-full h-14 metallic-gradient text-on-primary font-headline font-bold rounded-xl tracking-tight hover:brightness-110 active:scale-[0.98] transition-all flex items-center justify-center gap-2" type="submit">
                        Đăng Nhập
                        <span class="material-symbols-outlined text-lg">arrow_forward</span>
</button>
</form>
<!-- Authentication Support Meta -->
<div class="mt-10 flex items-center justify-center gap-2">
<div class="w-1.5 h-1.5 rounded-full bg-emerald-500 animate-pulse"></div>
<span class="text-[10px] font-label uppercase tracking-widest text-on-surface-variant/40">Được bảo mật bằng JWT Stateless Auth</span>
</div>
</div>
<!-- Footer Meta -->
<div class="mt-8 text-center space-y-4">
<p class="text-xs text-on-surface-variant/60 font-body">
                    Chưa có tài khoản? <a class="text-secondary font-semibold hover:underline" href="#">Đăng ký</a>
</p>
</div>
</div>
</main>
<!-- Simple Footer -->
<footer class="w-full py-12 flex flex-col items-center gap-6 px-6 bg-slate-950/30">
<div class="flex flex-wrap justify-center gap-8 text-[10px] font-['Inter'] uppercase tracking-widest text-slate-500">
<a class="hover:text-slate-200 transition-opacity opacity-80 hover:opacity-100" href="#">Chính sách bảo mật</a>
<a class="hover:text-slate-200 transition-opacity opacity-80 hover:opacity-100" href="#">Điều khoản dịch vụ</a>
<a class="hover:text-slate-200 transition-opacity opacity-80 hover:opacity-100" href="#">Trung tâm hỗ trợ</a>
</div>
<div class="text-[10px] font-['Inter'] uppercase tracking-[0.3em] text-amber-500 text-center">
            © 2024 Digital Atelier. Bảo lưu mọi quyền.
        </div>
</footer>
<!-- Background Decoration Images (High Contrast) -->
