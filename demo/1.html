<!DOCTYPE html>

<html class="dark" lang="vi"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Đăng ký | Digital Atelier</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "surface": "#0b1326",
              "on-tertiary-fixed-variant": "#00513b",
              "tertiary-container": "#001c12",
              "surface-container-low": "#131b2e",
              "inverse-surface": "#dae2fd",
              "tertiary": "#8bd6b6",
              "surface-container-highest": "#2d3449",
              "primary-fixed": "#dae2fd",
              "background": "#0b1326",
              "surface-container-lowest": "#060e20",
              "surface-bright": "#31394d",
              "error": "#ffb4ab",
              "on-background": "#dae2fd",
              "inverse-on-surface": "#283044",
              "on-secondary": "#3c2f00",
              "tertiary-fixed": "#a6f2d1",
              "on-primary": "#283044",
              "secondary": "#e9c349",
              "outline-variant": "#45464d",
              "secondary-fixed": "#ffe088",
              "primary-container": "#0f172a",
              "on-error-container": "#ffdad6",
              "error-container": "#93000a",
              "secondary-container": "#af8d11",
              "primary": "#bec6e0",
              "on-tertiary-fixed": "#002116",
              "on-error": "#690005",
              "on-primary-container": "#798098",
              "tertiary-fixed-dim": "#8bd6b6",
              "on-primary-fixed": "#131b2e",
              "surface-container-high": "#222a3d",
              "on-surface-variant": "#c6c6cd",
              "surface-dim": "#0b1326",
              "on-secondary-container": "#342800",
              "primary-fixed-dim": "#bec6e0",
              "on-primary-fixed-variant": "#3f465c",
              "inverse-primary": "#565e74",
              "surface-variant": "#2d3449",
              "surface-container": "#171f33",
              "outline": "#909097",
              "secondary-fixed-dim": "#e9c349",
              "on-secondary-fixed": "#241a00",
              "on-tertiary": "#003828",
              "surface-tint": "#bec6e0",
              "on-secondary-fixed-variant": "#574500",
              "on-surface": "#dae2fd",
              "on-tertiary-container": "#448e72"
            },
            fontFamily: {
              "headline": ["Manrope"],
              "body": ["Inter"],
              "label": ["Inter"]
            },
            borderRadius: {"DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem"},
          },
        },
      }
    </script>
<style>
      .glass-panel {
        background: rgba(45, 52, 73, 0.4);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
      }
      .cta-gradient {
        background: linear-gradient(135deg, #bec6e0 0%, #0f172a 100%);
      }
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
      }
    </style>
</head>
<body class="bg-surface text-on-surface font-body selection:bg-secondary selection:text-on-secondary min-h-screen flex flex-col">
<!-- TopNavBar (Suppressed for transactional screen logic) -->
<main class="flex-grow flex items-center justify-center px-4 py-12 lg:py-20 relative overflow-hidden">
<!-- Background Artistic Element -->
<div class="absolute top-[-10%] left-[-10%] w-[50%] h-[50%] bg-primary/5 rounded-full blur-[120px]"></div>
<div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-secondary/5 rounded-full blur-[120px]"></div>
<div class="w-full max-w-xl grid grid-cols-1 lg:grid-cols-1 gap-12 relative z-10">
<!-- Header Section -->
<div class="text-center space-y-4">
<h1 class="font-headline text-5xl font-extrabold tracking-tighter text-on-surface leading-tight">
                    Digital Atelier
                </h1>
<p class="font-body text-on-surface-variant text-lg tracking-wide">
                    Tham gia cộng đồng chế tác kỹ thuật số tinh hoa.
                </p>
</div>
<!-- Sign Up Card -->
<div class="glass-panel p-8 md:p-12 rounded-xl shadow-2xl border border-outline-variant/15">
<form class="space-y-6">
<!-- Full Name -->
<div class="space-y-2">
<label class="block font-label text-sm uppercase tracking-widest text-on-surface-variant ml-1">Họ và Tên</label>
<div class="relative">
<input class="w-full bg-surface-container-lowest text-on-surface rounded-xl px-4 py-4 focus:ring-1 focus:ring-secondary/40 border-none placeholder:text-on-surface-variant/30 transition-all outline-none" placeholder="Alexander Thorne" type="text"/>
</div>
</div>
<!-- Email -->
<div class="space-y-2">
<label class="block font-label text-sm uppercase tracking-widest text-on-surface-variant ml-1">Địa chỉ Email</label>
<div class="relative">
<input class="w-full bg-surface-container-lowest text-on-surface rounded-xl px-4 py-4 focus:ring-1 focus:ring-secondary/40 border-none placeholder:text-on-surface-variant/30 transition-all outline-none" placeholder="atelier@studio.com" type="email"/>
</div>
</div>
<!-- Password Grid -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-6">
<div class="space-y-2">
<label class="block font-label text-sm uppercase tracking-widest text-on-surface-variant ml-1">Mật khẩu</label>
<input class="w-full bg-surface-container-lowest text-on-surface rounded-xl px-4 py-4 focus:ring-1 focus:ring-secondary/40 border-none placeholder:text-on-surface-variant/30 transition-all outline-none" placeholder="••••••••" type="password"/>
</div>
<div class="space-y-2">
<label class="block font-label text-sm uppercase tracking-widest text-on-surface-variant ml-1">Xác nhận mật khẩu</label>
<input class="w-full bg-surface-container-lowest text-on-surface rounded-xl px-4 py-4 focus:ring-1 focus:ring-secondary/40 border-none placeholder:text-on-surface-variant/30 transition-all outline-none" placeholder="••••••••" type="password"/>
</div>
</div>
<!-- Terms & Conditions -->
<div class="flex items-start gap-3 pt-2">
<div class="flex items-center h-5">
<input class="w-5 h-5 rounded bg-surface-container-lowest border-none text-secondary focus:ring-offset-surface focus:ring-secondary/40" id="terms" type="checkbox"/>
</div>
<label class="text-sm text-on-surface-variant leading-tight cursor-pointer" for="terms">
                            Tôi đồng ý với <span class="text-secondary hover:underline transition-all">Điều khoản Dịch vụ</span> và <span class="text-secondary hover:underline transition-all">Chính sách Bảo mật</span>.
                        </label>
</div>
<!-- CTA Button -->
<div class="pt-4">
<button class="w-full cta-gradient text-on-primary font-headline font-bold py-5 rounded-xl shadow-lg hover:shadow-secondary/5 active:scale-[0.98] transition-all tracking-tight text-lg" type="submit">
                            Tạo tài khoản
                        </button>
</div>
<!-- Log In Link -->
<div class="text-center pt-4">
<p class="text-on-surface-variant text-sm tracking-wide">
                            Đã có tài khoản? 
                            <a class="text-secondary font-semibold hover:text-on-tertiary-container transition-colors ml-1" href="#">Đăng nhập</a>
</p>
</div>
</form>
</div>
</div>
</main>
<!-- Footer Component -->
<footer class="bg-slate-950 w-full py-12 tonal-shift bg-slate-900/50 flat flex flex-col items-center gap-6 px-6">
<div class="flex flex-wrap justify-center gap-8">
<a class="font-['Inter'] text-xs uppercase tracking-widest text-slate-500 hover:text-slate-200 opacity-80 hover:opacity-100 transition-opacity" href="#">Chính sách Bảo mật</a>
<a class="font-['Inter'] text-xs uppercase tracking-widest text-slate-500 hover:text-slate-200 opacity-80 hover:opacity-100 transition-opacity" href="#">Điều khoản Dịch vụ</a>
<a class="font-['Inter'] text-xs uppercase tracking-widest text-slate-500 hover:text-slate-200 opacity-80 hover:opacity-100 transition-opacity" href="#">Trung tâm Trợ giúp</a>
</div>
<div class="mt-4">
<span class="font-['Inter'] text-xs uppercase tracking-widest text-slate-500">© 2024 Digital Atelier. Bảo lưu mọi quyền.</span>
</div>
</footer>
</body></html>
