#Server port
server.port= 8900

#Application name
spring.application.name= api-gateway

#Eureka Client configuration
eureka.client.service-url.defaultZone = http://localhost:8761/eureka
eureka.instance.prefer-ip-address=true
eureka.client.registry-fetch-interval-seconds=5
spring.cloud.loadbalancer.cache.ttl=0
spring.cloud.loadbalancer.cache.enabled=false

#SPRING CLOUD GATEWAY CONFIGURATION
#----------------------------------
spring.cloud.gateway.discovery.locator.enabled=true
spring.cloud.gateway.discovery.locator.lower-case-service-id=true

# Map paths to services
# User service : /api/accounts/** -> user-service
spring.cloud.gateway.routes[0].id=user-service
spring.cloud.gateway.routes[0].uri=lb://user-service
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/accounts/**
spring.cloud.gateway.routes[0].filters[0]=RewritePath=/api/accounts/(?<segment>.*), /${segment}

# Catalog service : /api/catalog/** -> product-catalog-service
spring.cloud.gateway.routes[1].id=product-catalog-service
spring.cloud.gateway.routes[1].uri=lb://product-catalog-service
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/catalog/**
spring.cloud.gateway.routes[1].filters[0]=RewritePath=/api/catalog/(?<segment>.*), /${segment}

# Order service : /api/shop/** -> order-service
spring.cloud.gateway.routes[2].id=order-service
spring.cloud.gateway.routes[2].uri=lb://order-service
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/shop/**
spring.cloud.gateway.routes[2].filters[0]=RewritePath=/api/shop/(?<segment>.*), /${segment}

# Recommendation service : /api/review/** -> product-recommendation-service
spring.cloud.gateway.routes[3].id=product-recommendation-service
spring.cloud.gateway.routes[3].uri=lb://product-recommendation-service
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/review/**
spring.cloud.gateway.routes[3].filters[0]=RewritePath=/api/review/(?<segment>.*), /${segment}

# Admin BFF service : /api/admin-bff/** -> admin-service
spring.cloud.gateway.routes[4].id=admin-service
spring.cloud.gateway.routes[4].uri=lb://admin-service
spring.cloud.gateway.routes[4].predicates[0]=Path=/api/admin-bff/**
spring.cloud.gateway.routes[4].filters[0]=RewritePath=/api/admin-bff/(?<segment>.*), /${segment}

# Notification service : /api/notification/** -> notification-service
spring.cloud.gateway.routes[5].id=notification-service
spring.cloud.gateway.routes[5].uri=lb://notification-service
spring.cloud.gateway.routes[5].predicates[0]=Path=/api/notification/**
spring.cloud.gateway.routes[5].filters[0]=RewritePath=/api/notification/(?<segment>.*), /${segment}

# Payment routing (handled by order-service) : /api/payment/** -> order-service
spring.cloud.gateway.routes[6].id=payment-route
spring.cloud.gateway.routes[6].uri=lb://order-service
spring.cloud.gateway.routes[6].predicates[0]=Path=/api/payment/**

# Blog service : /api/blog/** -> blog-service
spring.cloud.gateway.routes[7].id=blog-service
spring.cloud.gateway.routes[7].uri=lb://blog-service
spring.cloud.gateway.routes[7].predicates[0]=Path=/api/blog/**
spring.cloud.gateway.routes[7].filters[0]=RewritePath=/api/blog/(?<segment>.*), /${segment}

# Media service : /api/media/** -> media-service
spring.cloud.gateway.routes[8].id=media-service
spring.cloud.gateway.routes[8].uri=lb://media-service
spring.cloud.gateway.routes[8].predicates[0]=Path=/api/media/**
spring.cloud.gateway.routes[8].filters[0]=RewritePath=/api/media/(?<segment>.*), /${segment}

#SPRING SESSION & REDIS PROPERTIES :
#-------------------------------
# Disabled: Gateway now uses JWT (stateless), no need for Redis session
# spring.session.store-type=redis
# spring.session.redis.namespace=session
# spring.session.redis.flush-mode=on-save
spring.redis.host=localhost
spring.redis.port=6379

#SECURITY
#---------------------------------
# Gateway uses JWT via JwtAuthenticationFilter (stateless). No session needed.

#CORS
spring.cloud.gateway.globalcors.add-to-simple-url-handler-mapping=true
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedOrigins=http://localhost:5173,http://localhost:3000,http://192.168.5.1:3000
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedMethods=GET,POST,PUT,DELETE,OPTIONS
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedHeaders=*
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowCredentials=true

# Handle large multipart requests for image uploads (WebFlux)
spring.codec.max-in-memory-size=50MB
# Optional: some versions of SCG use these for netty
# spring.cloud.gateway.http-client.max-request-length=50MB

spring.main.lazy-initialization=true
